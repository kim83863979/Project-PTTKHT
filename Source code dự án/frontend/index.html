<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path Finding Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Path Finding Visualizer</h1>

    <div class="toolbar">
      <select id="algo-select">
        <option value="bfs">BFS</option>
        <option value="dfs">DFS</option>
        <option value="dijkstra">Dijkstra Algorithm</option>
        <option value="astar">A* Algorithm</option>
      </select>

      <button id="btn-run">Run Algorithm</button>

      <div
        class="slider-container"
        style="
          display: inline-flex;
          align-items: center;
          margin: 0 10px;
          gap: 5px;
        "
      >
        <label
          for="speed-slider"
          style="font-size: 14px; font-weight: 600; color: #4a5568"
          >Speed:</label
        >
        <input
          type="range"
          id="speed-slider"
          min="1"
          max="10"
          value="5"
          style="cursor: pointer"
        />
      </div>

      <button id="btn-maze">Generate Maze</button>
      <button id="btn-clear">Clear Board</button>
    </div>

    <div class="dashboard" style="margin-bottom: 20px">
      <span>Cost: <strong id="stat-cost">0</strong></span> |
      <span>Visited: <strong id="stat-visited">0</strong></span> |
      <span>Time: <strong id="stat-time">0 ms</strong></span>
    </div>

    <div id="grid"></div>
    <script src="api.js"></script>
    <script src="app.js"></script>
  </body>
</html>
